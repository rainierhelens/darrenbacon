<div class="ascii-section" id="contact-section">

    <form class="contact-form" id="contactForm" action="https://formspree.io/f/xovwaqaq" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required autocomplete="off">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="off">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required autocomplete="off"></textarea>

        <button type="submit">SEND</button>
    </form>
    <div id="form-success-popup" class="form-success-popup" style="display:none;">
        <div class="form-success-content">
            <span class="form-success-close" onclick="document.getElementById('form-success-popup').style.display='none'">&times;</span>
            <h2>Thank you!</h2>
            <p>Your message has been sent successfully.</p>
        </div>
    </div>
    <div class="contact-note">
        <p>Email: <a href="mailto:darren@darrenbacon.com">darren@darrenbacon.com</a></p>
    </div>
</div>



<footer class="ascii-footer">
    <div>
        <span>&copy; Darren Bacon, 2025</span> | 
        <a href="mailto:darren@darrenbacon.com">darren@darrenbacon.com</a> | 
        <a href="https://www.darrenbacon.com">www.darrenbacon.com</a>
    </div>
</footer>
</main>
<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = e.target;
    const data = new FormData(form);
    const action = form.action;
    try {
        const response = await fetch(action, {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
            form.reset();
            document.getElementById('form-success-popup').style.display = 'block';
        } else {
            alert('There was a problem sending your message. Please try again.');
        }
    } catch (err) {
        alert('There was a problem sending your message. Please try again.');
    }
});

</script>
<script src="scripts.js" defer></script>
</body>
</html>
